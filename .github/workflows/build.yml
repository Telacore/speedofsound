name: Build

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - 'scripts/**'
      - '**.md'
      - 'mkdocs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install GTK4
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build
        env:
          GRADLE_OPTS: --enable-native-access=ALL-UNNAMED
        run: ./gradlew build
      - name: Verify no hard process exits in app startup path
        run: |
          if rg -q "exitProcess\\(" app/src/main/kotlin; then
            echo "Hard process exits found in app source."
            rg -n "exitProcess\\(" app/src/main/kotlin
            exit 1
          fi
          echo "No hard process exits in app source."
      - name: Run startup smoke check
        env:
          GRADLE_OPTS: --enable-native-access=ALL-UNNAMED
          SMOKE_TIMEOUT: 20
        run: make smoke-startup
      - name: Run Cinnamon-compat startup smoke check
        env:
          GRADLE_OPTS: --enable-native-access=ALL-UNNAMED
          SMOKE_TIMEOUT: 25
        run: ./scripts/smoke-startup-cinnamon.sh
      - name: Check
        env:
          GRADLE_OPTS: --enable-native-access=ALL-UNNAMED
        run: ./gradlew check
